<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Data Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 24px; }
        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        .stat-card h3 { font-size: 14px; color: #ccc; margin-bottom: 10px; }
        .stat-card p { font-size: 32px; font-weight: bold; color: white; }
        .table-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        th { background: rgba(102,126,234,0.3); }
        .loading { text-align: center; padding: 50px; color: white; }
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .nav-btn:hover { background: #667eea; }
        .nav-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .status-baru {
            background: #28a745;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
        }
        .status-proses {
            background: #ffc107;
            color: #333;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
        }
        .status-selesai {
            background: #17a2b8;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
        }
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-buttons">
            <a href="admin.html" class="nav-btn active"><i class="fas fa-chart-line"></i> Admin Panel</a>
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Dashboard Customer</a>
        </div>

        <div class="header">
            <h1><i class="fas fa-database"></i> Data Order Customer</h1>
            <button class="refresh-btn" onclick="loadData()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3>Total Order</h3><p id="totalOrders">0</p></div>
            <div class="stat-card"><h3>Order Hari Ini</h3><p id="todayOrders">0</p></div>
            <div class="stat-card"><h3>Perlu Diproses</h3><p id="pendingOrders">0</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat data dari Google Sheets...</div>
            <div id="tableContent" style="display: none;">
                <table id="orderTable">
                    <thead>
                        <tr>
                            <th>No</th><th>Waktu</th><th>Nama</th><th>WhatsApp</th>
                            <th>Game</th><th>Paket</th><th>Harga</th>
                            <th>Rank Awal</th><th>Rank Tujuan</th>
                            <th>ID Game</th><th>Username</th><th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ============ GANTI DENGAN SHEET_ID KAMU ============
        const SHEET_ID = '1maTjRm4SvlW0RcP7NzBU_QmJzuvRZ-IM3mkndop-t-I';  // <-- GANTI DENGAN SHEET_ID DARI GOOGLE SHEETS
        
        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tableContent').style.display = 'none';
            
            try {
                // Gunakan Google Visualization API
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                const response = await fetch(url);
                const text = await response.text();
                
                // Parse JSONP response
                const jsonStr = text.substring(47, text.length - 2);
                const data = JSON.parse(jsonStr);
                
                const rows = data.table.rows;
                const orders = [];
                
                // Mulai dari baris 1 (skip header)
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i].c;
                    if (row && row[0] && row[0].v) {
                        orders.push({
                            waktu: row[0]?.v || '-',
                            nama: row[1]?.v || '-',
                            wa: row[2]?.v || '-',
                            game: row[3]?.v || '-',
                            paket: row[4]?.v || '-',
                            harga: row[5]?.v || '-',
                            rankAwal: row[6]?.v || '-',
                            rankTujuan: row[7]?.v || '-',
                            idGame: row[8]?.v || '-',
                            username: row[9]?.v || '-',
                            catatan: row[10]?.v || '-',
                            status: row[11]?.v || 'Baru'
                        });
                    }
                }
                
                renderOrders(orders);
                
                // Update statistik
                document.getElementById('totalOrders').innerText = orders.length;
                
                const today = new Date().toDateString();
                const todayOrders = orders.filter(o => {
                    if (o.waktu === '-') return false;
                    return new Date(o.waktu).toDateString() === today;
                }).length;
                document.getElementById('todayOrders').innerText = todayOrders;
                
                const pendingOrders = orders.filter(o => o.status === 'Baru' || o.status === 'Proses').length;
                document.getElementById('pendingOrders').innerText = pendingOrders;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal memuat data. Pastikan Google Sheets sudah dipublikasikan dan SHEET_ID benar.';
            }
        }
        
        function renderOrders(orders) {
            const tbody = document.getElementById('orderTableBody');
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="12" style="text-align:center">📭 Belum ada order</td></tr>';
            } else {
                tbody.innerHTML = orders.map((order, index) => {
                    let statusClass = 'status-baru';
                    if (order.status === 'Proses') statusClass = 'status-proses';
                    if (order.status === 'Selesai') statusClass = 'status-selesai';
                    
                    return `<tr>
                        <td>${index + 1}</td>
                        <td>${order.waktu}</td>
                        <td>${order.nama}</td>
                        <td>${order.wa}</td>
                        <td>${order.game}</td>
                        <td>${order.paket}</td>
                        <td>${order.harga}</td>
                        <td>${order.rankAwal}</td>
                        <td>${order.rankTujuan}</td>
                        <td>${order.idGame}</td>
                        <td>${order.username}</td>
                        <td><span class="${statusClass}">${order.status}</span></td>
                    </tr>`;
                }).join('');
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('tableContent').style.display = 'block';
        }
        
        // Load data saat halaman dibuka
        loadData();
        
        // Auto refresh setiap 30 detik
        setInterval(loadData, 30000);
    </script>
</body>
</html>
